name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_LOOTLOCKER_GAME_KEY: ${{ secrets.VITE_LOOTLOCKER_GAME_KEY }}
          VITE_LOOTLOCKER_LEADERBOARD_KEY: ${{ secrets.VITE_LOOTLOCKER_LEADERBOARD_KEY }}
          VITE_LOOTLOCKER_GAME_VERSION: ${{ vars.VITE_LOOTLOCKER_GAME_VERSION || '0.1.0' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
